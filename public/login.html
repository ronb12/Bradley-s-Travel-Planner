<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Bradley's Travel Planner</title>
    <meta name="description" content="Sign in to Bradley's Travel Planner - Plan your perfect trip with our comprehensive travel planning tool">
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#667eea">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Travel Planner">

    <!-- Favicon and Icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=3">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png?v=3">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png?v=3">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png?v=4">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png?v=4">
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/apple-touch-icon-167x167.png?v=4">
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/apple-touch-icon-152x152.png?v=4">
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144x144.png?v=4">
    <link rel="apple-touch-icon" sizes="96x96" href="/icons/icon-96x96.png?v=4">
    <link rel="apple-touch-icon" sizes="72x72" href="/icons/icon-72x72.png?v=4">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json?v=4">
</head>
<body>
    <!-- Login Page -->
    <div id="login-page" class="login-page">
        <div class="login-container">
            <div class="login-header">
                <div class="login-logo">
                    <i class="fas fa-plane" aria-hidden="true"></i>
                    <h1>Bradley's Travel Planner</h1>
                    <p class="company-tagline">by Bradley Virtual Solutions, LLC</p>
                </div>
            </div>

            <div class="login-content">
                <!-- Sign In Form -->
                <div class="login-form active">
                    <h2>Welcome Back</h2>
                    <p class="login-subtitle">Sign in to access your travel plans</p>

                    <form id="signin-form-element" novalidate>
                        <div class="form-group">
                            <label for="signin-email">Email Address</label>
                            <div class="input-group">
                                <i class="fas fa-envelope" aria-hidden="true"></i>
                                <input type="email" id="signin-email" name="email" required
                                       autocomplete="email" placeholder="Enter your email"
                                       aria-required="true">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="signin-password">Password</label>
                            <div class="input-group">
                                <i class="fas fa-lock" aria-hidden="true"></i>
                                <input type="password" id="signin-password" name="password" required
                                       autocomplete="current-password" placeholder="Enter your password"
                                       aria-required="true">
                                <button type="button" class="password-toggle"
                                        aria-label="Show password"
                                        aria-controls="signin-password"
                                        onclick="togglePassword('signin-password', this)">
                                    <i class="fas fa-eye" aria-hidden="true"></i>
                                </button>
                            </div>
                        </div>

                        <div class="form-options">
                            <label class="checkbox-label">
                                <input type="checkbox" id="remember-me" name="remember-me">
                                <span class="checkmark" aria-hidden="true"></span>
                                Remember me
                            </label>
                            <a href="#" class="forgot-password" onclick="showForgotPassword(); return false;">Forgot Password?</a>
                        </div>

                        <button type="submit" class="btn btn-primary btn-full">
                            <i class="fas fa-sign-in-alt" aria-hidden="true"></i>
                            Sign In
                        </button>
                    </form>

                    <div class="divider" role="separator">
                        <span>or</span>
                    </div>

                    <button class="btn btn-google" onclick="signInWithGoogle()">
                        <i class="fab fa-google" aria-hidden="true"></i>
                        Continue with Google
                    </button>
                </div>

                <div class="login-switch">
                    <p>Don't have an account? <a href="signup.html">Create one here</a></p>
                </div>
            </div>

            <div class="login-footer">
                <p>&copy; 2026 Bradley Virtual Solutions, LLC. All rights reserved.</p>
            </div>
        </div>
    </div>

    <!-- Firebase Configuration -->
    <script type="module" src="firebase-config.js"></script>
    
    <!-- Authentication Script -->
    <script type="module" src="auth.js"></script>
</body>
</html>
