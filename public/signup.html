<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Bradley's Travel Planner</title>
    
    <!-- Meta Tags -->
    <meta name="description" content="Create your account and start planning amazing trips with Bradley's Travel Planner">
    <meta name="keywords" content="travel planner, trip planning, vacation, travel, Bradley's Travel Planner">
    <meta name="author" content="Bradley Virtual Solutions, LLC">
    <meta name="theme-color" content="#667eea">

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Sign Up - Bradley's Travel Planner">
    <meta property="og:description" content="Create your account and start planning amazing trips">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://bradleys-travel-planner.web.app/signup.html">
    <meta property="og:image" content="https://bradleys-travel-planner.web.app/icons/icon-512x512.png">
    <meta property="og:image:width" content="512">
    <meta property="og:image:height" content="512">

    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Travel Planner">

    <!-- Favicon and Icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=3">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png?v=3">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png?v=3">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png?v=4">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png?v=4">
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/apple-touch-icon-167x167.png?v=4">
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/apple-touch-icon-152x152.png?v=4">
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144x144.png?v=4">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json?v=4">
</head>
<body>
    <!-- Sign Up Page -->
    <div id="signup-page" class="login-page">
        <div class="login-container">
            <div class="login-header">
                <div class="login-logo">
                    <i class="fas fa-plane" aria-hidden="true"></i>
                    <h1>Bradley's Travel Planner</h1>
                    <p class="company-tagline">by Bradley Virtual Solutions, LLC</p>
                </div>
            </div>

            <div class="login-content">
                <!-- Sign Up Form -->
                <div class="login-form active">
                    <h2>Create Account</h2>
                    <p class="login-subtitle">Start planning your next adventure</p>

                    <form id="signup-form-element" novalidate>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="signup-firstname">First Name</label>
                                <div class="input-group">
                                    <i class="fas fa-user" aria-hidden="true"></i>
                                    <input type="text" id="signup-firstname" name="firstname" required
                                           autocomplete="given-name" placeholder="First name"
                                           aria-required="true">
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="signup-lastname">Last Name</label>
                                <div class="input-group">
                                    <i class="fas fa-user" aria-hidden="true"></i>
                                    <input type="text" id="signup-lastname" name="lastname" required
                                           autocomplete="family-name" placeholder="Last name"
                                           aria-required="true">
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="signup-email">Email Address</label>
                            <div class="input-group">
                                <i class="fas fa-envelope" aria-hidden="true"></i>
                                <input type="email" id="signup-email" name="email" required
                                       autocomplete="email" placeholder="Enter your email"
                                       aria-required="true">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="signup-password">Password</label>
                            <div class="input-group">
                                <i class="fas fa-lock" aria-hidden="true"></i>
                                <input type="password" id="signup-password" name="password" required
                                       autocomplete="new-password" placeholder="Create a password"
                                       aria-required="true">
                                <button type="button" class="password-toggle"
                                        aria-label="Show password"
                                        aria-controls="signup-password"
                                        onclick="togglePassword('signup-password', this)">
                                    <i class="fas fa-eye" aria-hidden="true"></i>
                                </button>
                            </div>
                            <div class="password-strength" aria-live="polite">
                                <div class="strength-bar">
                                    <div class="strength-fill"></div>
                                </div>
                                <span class="strength-text">Password strength</span>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="signup-confirm-password">Confirm Password</label>
                            <div class="input-group">
                                <i class="fas fa-lock" aria-hidden="true"></i>
                                <input type="password" id="signup-confirm-password" name="confirm-password" required
                                       autocomplete="new-password" placeholder="Confirm your password"
                                       aria-required="true">
                                <button type="button" class="password-toggle"
                                        aria-label="Show password"
                                        aria-controls="signup-confirm-password"
                                        onclick="togglePassword('signup-confirm-password', this)">
                                    <i class="fas fa-eye" aria-hidden="true"></i>
                                </button>
                            </div>
                        </div>

                        <div class="form-options">
                            <label class="checkbox-label">
                                <input type="checkbox" id="terms-agreement" name="terms-agreement" required aria-required="true">
                                <span class="checkmark" aria-hidden="true"></span>
                                I agree to the <a href="#" onclick="showTerms(); return false;">Terms of Service</a> and <a href="#" onclick="showPrivacy(); return false;">Privacy Policy</a>
                            </label>
                        </div>

                        <button type="submit" class="btn btn-primary btn-full">
                            <i class="fas fa-user-plus" aria-hidden="true"></i>
                            Create Account
                        </button>
                    </form>

                    <div class="divider" role="separator">
                        <span>or</span>
                    </div>

                    <button class="btn btn-google" onclick="signUpWithGoogle()">
                        <i class="fab fa-google" aria-hidden="true"></i>
                        Continue with Google
                    </button>

                    <div class="login-switch">
                        <p>Already have an account? <a href="login.html">Sign in here</a></p>
                    </div>
                </div>
            </div>

            <div class="login-footer">
                <p>&copy; 2026 Bradley Virtual Solutions, LLC. All rights reserved.</p>
            </div>
        </div>
    </div>

    <!-- Firebase Configuration -->
    <script type="module" src="firebase-config.js"></script>
    
    <!-- Authentication Script -->
    <script type="module" src="auth.js"></script>
</body>
</html>
